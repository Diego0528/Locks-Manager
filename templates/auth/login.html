<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Locks Manager</title>
  <style>
    :root {
      --bg: #0a0e1a; --card: #111827; --border: #1e293b;
      --text: #e2e8f0; --text-2: #94a3b8;
      --blue: #3b82f6; --blue-d: #1d4ed8;
      --green: #10b981; --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 40px 36px; width: 100%; max-width: 380px;
    }
    .brand {
      text-align: center; margin-bottom: 32px;
    }
    .brand-icon {
      width: 52px; height: 52px; border-radius: 12px; margin: 0 auto 12px;
      background: linear-gradient(135deg, #3b82f6, #22d3ee);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .brand h1 { font-size: 1.2rem; font-weight: 700; }
    .brand p  { font-size: 0.82rem; color: var(--text-2); margin-top: 4px; }
    label {
      display: block; font-size: 0.82rem; color: var(--text-2);
      margin-bottom: 6px; margin-top: 16px;
    }
    input[type=text], input[type=password] {
      width: 100%; background: #0f1629; border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 10px 12px;
      font-size: 0.95rem; outline: none; transition: border-color .18s;
    }
    input:focus { border-color: var(--blue); }
    .btn-login {
      width: 100%; margin-top: 24px; padding: 11px;
      background: var(--blue); color: #fff; border: none;
      border-radius: 6px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background .18s;
    }
    .btn-login:hover { background: var(--blue-d); }
    .alert {
      background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.35);
      color: #fca5a5; border-radius: 6px; padding: 10px 14px;
      font-size: 0.85rem; margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <div class="brand-icon">🔐</div>
    <h1>Locks Manager</h1>
    <p>PHA Hotel</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="alert">{{ msg }}</div>
  {% endfor %}
  {% endwith %}

  <form method="post">
    <label>Usuario</label>
    <input type="text" name="username" autocomplete="username"
           autofocus placeholder="usuario" required>
    <label>Contraseña</label>
    <input type="password" name="password" autocomplete="current-password"
           placeholder="••••••••" required>
    <button type="submit" class="btn-login">Entrar</button>
  </form>
</div>
</body>
</html>
