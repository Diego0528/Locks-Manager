{% extends 'base.html' %}
{% block title %}Editar {{ lock.room_code }}{% endblock %}
{% block page_title %}Editar — {{ lock.room_code }}{% endblock %}

{% block content %}
<div class="card" style="max-width:640px;margin:0 auto;">
  <div class="card-header">✏️ Editar Cerradura</div>
  <div class="card-body">
    <form method="post">
      <div class="form-grid">
        <div class="form-group">
          <label>Sector *</label>
          <select name="sector_id" required>
            {% for s in sectors %}
            <option value="{{ s.id }}" {% if lock.sector_id == s.id %}selected{% endif %}>
              {{ s.code }} — {{ s.name }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Código Habitación *</label>
          <input type="text" name="room_code" required value="{{ lock.room_code }}" style="text-transform:uppercase;">
        </div>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" name="room_name" value="{{ lock.room_name or '' }}">
        </div>
        <div class="form-group">
          <label>Modelo</label>
          <input type="text" name="model" value="{{ lock.model or '790' }}">
        </div>
        <div class="form-group">
          <label>N° de Serie</label>
          <input type="text" name="serial_number" value="{{ lock.serial_number or '' }}">
        </div>
        <div class="form-group">
          <label>Fecha de Instalación</label>
          <input type="date" name="installation_date"
                 value="{{ lock.installation_date.isoformat() if lock.installation_date else '' }}">
        </div>
        <div class="form-group">
          <label>Última Config. Reloj</label>
          <input type="date" name="last_clock_config"
                 value="{{ lock.last_clock_config.isoformat() if lock.last_clock_config else '' }}">
        </div>
      </div>
      <div class="form-group mt-8">
        <label>Notas</label>
        <textarea name="notes" rows="2">{{ lock.notes or '' }}</textarea>
      </div>
      <div class="d-flex gap-8 mt-16">
        <a href="{{ url_for('locks.detail', lock_id=lock.id) }}" class="btn btn-ghost">Cancelar</a>
        <button type="submit" class="btn btn-primary">💾 Actualizar</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
